# ============================================================
# Plan-B Systems SIEM Stack
# Graylog 7.2 + OpenSearch 2.x + MongoDB 7.0
# Run via install.sh or: docker compose --env-file config.env up -d
# ============================================================

networks:
  siem-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  mongodb-data:
  opensearch-data:
  graylog-data:
  graylog-journal:
  license-data:

services:

  # ── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: plansb-mongodb
    restart: unless-stopped
    networks:
      - siem-net
    volumes:
      - mongodb-data:/data/db
    environment:
      TZ: "${TIMEZONE:-Asia/Jerusalem}"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    labels:
      com.planbsystems.role: "mongodb"
      com.planbsystems.client: "${CLIENT_NAME}"

  # ── OpenSearch ───────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: plansb-opensearch
    restart: unless-stopped
    networks:
      - siem-net
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    environment:
      cluster.name: "graylog-cluster"
      node.name: "opensearch-node1"
      discovery.type: "single-node"
      OPENSEARCH_JAVA_OPTS: "-Xms${OPENSEARCH_HEAP_SIZE:-2g} -Xmx${OPENSEARCH_HEAP_SIZE:-2g}"
      bootstrap.memory_lock: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      indices.query.bool.max_clause_count: "32768"
      action.auto_create_index: "false"
      cluster.routing.allocation.disk.watermark.low: "80%"
      cluster.routing.allocation.disk.watermark.high: "${DISK_WATERMARK_HIGH:-85}%"
      cluster.routing.allocation.disk.watermark.flood_stage: "${DISK_WATERMARK_FLOOD:-92}%"
      TZ: "${TIMEZONE:-Asia/Jerusalem}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?pretty | grep -q '\"status\"'"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    labels:
      com.planbsystems.role: "opensearch"
      com.planbsystems.client: "${CLIENT_NAME}"

  # ── Graylog 7.2 ──────────────────────────────────────────
  graylog:
    image: ${GRAYLOG_IMAGE:-graylog/graylog:7.0}
    container_name: plansb-graylog
    restart: unless-stopped
    networks:
      - siem-net
    depends_on:
      mongodb:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    volumes:
      - graylog-data:/usr/share/graylog/data
      - graylog-journal:/usr/share/graylog/data/journal
      - ./certs:/usr/share/graylog/data/config/certs:ro
      - ./graylog/cacerts:/opt/java/openjdk/lib/security/cacerts:ro
    environment:
      # Core
      GRAYLOG_IS_MASTER: "true"
      GRAYLOG_NODE_ID_FILE: "/usr/share/graylog/data/config/node-id"
      GRAYLOG_PASSWORD_SECRET: "${GRAYLOG_PASSWORD_SECRET}"
      GRAYLOG_ROOT_PASSWORD_SHA2: "${GRAYLOG_ROOT_PASSWORD_SHA2}"
      GRAYLOG_ROOT_USERNAME: "admin"
      GRAYLOG_ROOT_TIMEZONE: "${TIMEZONE:-Asia/Jerusalem}"
      # HTTP / TLS
      GRAYLOG_HTTP_BIND_ADDRESS: "0.0.0.0:9000"
      GRAYLOG_HTTP_PUBLISH_URI: "https://${GRAYLOG_HOSTNAME:-localhost}:9000/"
      GRAYLOG_HTTP_ENABLE_TLS: "true"
      GRAYLOG_HTTP_TLS_CERT_FILE: "/usr/share/graylog/data/config/certs/graylog.crt"
      GRAYLOG_HTTP_TLS_KEY_FILE: "/usr/share/graylog/data/config/certs/graylog.key"
      # OpenSearch
      GRAYLOG_ELASTICSEARCH_HOSTS: "http://opensearch:9200"
      GRAYLOG_ELASTICSEARCH_COMPRESSION_ENABLED: "true"
      GRAYLOG_ELASTICSEARCH_INDEX_PREFIX: "graylog"
      GRAYLOG_ELASTICSEARCH_SHARDS: "1"
      GRAYLOG_ELASTICSEARCH_REPLICAS: "0"
      GRAYLOG_ELASTICSEARCH_MAX_NUMBER_OF_INDICES: "${RETENTION_DAYS:-730}"
      GRAYLOG_ELASTICSEARCH_RETENTION_STRATEGY: "delete"
      GRAYLOG_ELASTICSEARCH_ROTATION_STRATEGY: "time"
      GRAYLOG_ELASTICSEARCH_MAX_SIZE_PER_INDEX: "1073741824"
      # MongoDB
      GRAYLOG_MONGODB_URI: "mongodb://mongodb:27017/graylog"
      # Processing
      GRAYLOG_PROCESSBUFFER_PROCESSORS: "5"
      GRAYLOG_OUTPUTBUFFER_PROCESSORS: "3"
      GRAYLOG_PROCESSOR_WAIT_STRATEGY: "blocking"
      GRAYLOG_RING_SIZE: "65536"
      GRAYLOG_OUTPUT_BATCH_SIZE: "500"
      GRAYLOG_OUTPUT_FLUSH_INTERVAL: "1"
      # Timezone
      TZ: "${TIMEZONE:-Asia/Jerusalem}"
    ports:
      - "0.0.0.0:${GRAYLOG_WEB_PORT:-9000}:9000"
      - "0.0.0.0:${SYSLOG_UDP_PORT:-514}:514/udp"
      - "0.0.0.0:${SYSLOG_TCP_PORT:-1514}:1514/tcp"
      - "0.0.0.0:${GELF_UDP_PORT:-12201}:12201/udp"
      - "0.0.0.0:${GELF_TCP_PORT:-12202}:12202/tcp"
    healthcheck:
      test: ["CMD-SHELL", "curl -skf https://localhost:9000/api/ -o /dev/null && echo ok || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 180s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    labels:
      com.planbsystems.role: "graylog"
      com.planbsystems.client: "${CLIENT_NAME}"

  # ── License Checker ──────────────────────────────────────
  license-checker:
    build:
      context: ./license-checker
      dockerfile: Dockerfile
    image: plansb-license-checker:latest
    container_name: plansb-license-checker
    restart: unless-stopped
    networks:
      - siem-net
    depends_on:
      graylog:
        condition: service_healthy
    volumes:
      - license-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LICENSE_API_URL: "${LICENSE_API_URL:-https://api.plan-b.systems/license/check}"
      CLIENT_ID: "${CLIENT_ID}"
      GRACE_PERIOD_DAYS: "${GRACE_PERIOD_DAYS:-7}"
      GRAYLOG_CONTAINER: "plansb-graylog"
      OPENSEARCH_CONTAINER: "plansb-opensearch"
      STATE_FILE: "/data/license_state.json"
      LOG_FILE: "/data/license_checker.log"
      TZ: "${TIMEZONE:-Asia/Jerusalem}"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.planbsystems.role: "license-checker"
      com.planbsystems.client: "${CLIENT_NAME}"
